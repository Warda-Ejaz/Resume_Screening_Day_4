<!DOCTYPE html>
<html>
<head>
    <title>Resume Screener</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
       .container { border: 2px solid #4CAF50; padding: 30px; border-radius: 10px; }
        input[type="file"] { margin: 20px 0; }
        button { background: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; }
        h1 { color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Resume Screening System</h1>
        <p>Upload your resume PDF/DOCX/TXT and get job category prediction</p>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" accept=".pdf,.docx,.txt" required>
            <br>
            <button type="submit">Analyze Resume</button>
        </form>
    </div>
</body>
</html>
